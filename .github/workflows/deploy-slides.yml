# Builds the personal slide decks of the pushed branch and publishes them to GitHub
# Pages, one directory per branch:
#   - master           → https://<user>.github.io/reveal.js/
#   - any other branch → https://<user>.github.io/reveal.js/br/<branch>/
# This makes Claude Code Web branches previewable online before they are merged. The
# br/ prefix keeps branch directories from ever colliding with master's own content at
# the site root (e.g. a branch named "dist" or "assets").
#
# The deployment is INCREMENTAL: the published site lives in the `gh-pages` branch, and
# each run only rebuilds the pushed branch and replaces its directory there — the other
# branches' content is left as-is. Directories of branches that no longer exist on the
# repo are pruned on every run (the `delete` trigger fires one as soon as a branch is
# removed). Everything at the site root except br/ and the housekeeping files belongs
# to master's deployment; `.branches-manifest` at the gh-pages root lists the non-master
# branches currently deployed, so pruning knows which br/ subdirectories to drop.
# gh-pages history is kept to a single commit (amend + force-push) so the repo does not
# grow with every deployment.
#
# This works because build-decks.mjs emits a site with all-relative URLs, so a deck
# renders identically at the site root and under a <branch>/ subdirectory. See
# DEPLOIEMENT.md at the repo root for the full explanation and the design history.
#
# One-time repository setup: Settings → Pages → Build and deployment →
# Source: "Deploy from a branch", Branch: gh-pages / (root).
# (Run the workflow once first so the gh-pages branch exists.)
name: Deploy slides to GitHub Pages

on:
  push:
    branches: ['**', '!gh-pages']
    # The retired decks in archives/ are dev-only (build-decks.mjs never publishes
    # them): a push that only touches them cannot change the site, so skip the run
    paths-ignore: ['archives/**']
  # Branch deleted → prune its directory from the published site (this event always
  # runs the workflow as defined on the default branch)
  delete:
  workflow_dispatch:

permissions:
  contents: write

# One deployment at a time (runs rewrite the shared gh-pages branch); let in-flight
# deployments finish
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    # The delete event also fires for tags; only branch deletions matter here
    if: github.event_name != 'delete' || github.event.ref_type == 'branch'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        if: github.event_name != 'delete'
        with:
          node-version: 20
          cache: npm
      - name: Build the pushed branch
        if: github.event_name != 'delete'
        run: |
          npm ci
          npm run build:decks
      - name: Update the published site (gh-pages branch)
        env:
          EVENT: ${{ github.event_name }}
          BRANCH: ${{ github.ref_name }}
          REPO_URL: https://x-access-token:${{ github.token }}@github.com/${{ github.repository }}.git
        run: |
          set -eu
          mkdir "$RUNNER_TEMP/site" && cd "$RUNNER_TEMP/site"
          git init -q -b gh-pages
          git remote add origin "$REPO_URL"
          if git fetch -q --depth=1 origin gh-pages; then
            git reset -q --hard origin/gh-pages
          fi

          if [ "$EVENT" != delete ]; then
            if [ "$BRANCH" = master ]; then
              # Everything at the root except br/ and the housekeeping files belongs to
              # master's deployment: replace it wholesale
              find . -mindepth 1 -maxdepth 1 \
                ! -name .git ! -name br ! -name .branches-manifest ! -name .nojekyll \
                -exec rm -rf {} +
              cp -R "$GITHUB_WORKSPACE/_site/." .
            else
              rm -rf "./br/$BRANCH"
              mkdir -p "./br/$BRANCH"
              cp -R "$GITHUB_WORKSPACE/_site/." "./br/$BRANCH/"
              touch .branches-manifest
              grep -qxF "$BRANCH" .branches-manifest || echo "$BRANCH" >> .branches-manifest
            fi
          fi

          # Prune the directories of branches that no longer exist on the repo
          git ls-remote --heads origin | sed 's|.*refs/heads/||' > "$RUNNER_TEMP/live-branches"
          touch .branches-manifest
          grep -vxF -f "$RUNNER_TEMP/live-branches" .branches-manifest > "$RUNNER_TEMP/stale" || true
          while IFS= read -r stale; do
            [ -n "$stale" ] || continue
            echo "pruning deleted branch: $stale"
            rm -rf "./br/$stale"
            # Branch names may contain slashes: clean up now-empty parent directories,
            # up to and including br/ itself
            parent=$(dirname "br/$stale")
            while [ "$parent" != "." ]; do rmdir "$parent" 2>/dev/null || break; parent=$(dirname "$parent"); done
          done < "$RUNNER_TEMP/stale"
          grep -xF -f "$RUNNER_TEMP/live-branches" .branches-manifest > "$RUNNER_TEMP/kept" || true
          mv "$RUNNER_TEMP/kept" .branches-manifest

          # Pages must serve the vite _shared/ chunks: disable Jekyll (it skips _* paths)
          touch .nojekyll

          git add -A
          message="Deploy: $EVENT $BRANCH ($GITHUB_SHA)"
          export GIT_AUTHOR_NAME="github-actions[bot]" GIT_COMMITTER_NAME="github-actions[bot]"
          export GIT_AUTHOR_EMAIL="41898282+github-actions[bot]@users.noreply.github.com"
          export GIT_COMMITTER_EMAIL="$GIT_AUTHOR_EMAIL"
          if git rev-parse -q --verify HEAD > /dev/null; then
            # Amend instead of appending: keeps gh-pages at one single commit forever
            git commit -q --allow-empty --amend -m "$message"
          else
            git commit -q --allow-empty -m "$message"
          fi
          git push -q --force origin gh-pages
