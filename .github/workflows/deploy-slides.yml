# Builds the personal slide decks and publishes them to GitHub Pages.
#
# The framework files in dist/ are committed and published as-is (no framework rebuild
# here): what goes online is exactly what was tested locally. The build step only
# type-checks the project, assembles _site/ and compiles the d3 figure sources
# (assets/<deck>/*.ts) — see scripts/build-decks.mjs and vite.config.decks.ts.
#
# One-time repository setup: Settings → Pages → Build and deployment → Source:
# "GitHub Actions".
name: Deploy slides to GitHub Pages

on:
  push:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# One deployment at a time; let in-flight deployments finish
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run build:decks
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
